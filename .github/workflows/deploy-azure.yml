name: Deploy PRism to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_infrastructure:
        description: 'Skip infrastructure deployment'
        required: false
        type: boolean
        default: false

  push:
    branches:
      - main
      - develop
    paths:
      - 'agents/**'
      - 'foundry/**'
      - 'mcp_servers/**'
      - 'foundry/deployment_config/**'

env:
  AZURE_RESOURCE_GROUP: rg-prism-${{ github.event.inputs.environment || 'dev' }}
  AZURE_LOCATION: eastus2
  DEPLOYMENT_NAME: prism-deploy-${{ github.run_number }}

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      # ════════════════════════════════════════════════════════════
      # Setup
      # ════════════════════════════════════════════════════════════
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'
      
      # ════════════════════════════════════════════════════════════
      # Deploy Infrastructure
      # ════════════════════════════════════════════════════════════
      
      - name: Create Resource Group
        if: ${{ !inputs.skip_infrastructure }}
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }}
      
      - name: Deploy Bicep Template
        if: ${{ !inputs.skip_infrastructure }}
        id: bicep_deploy
        run: |
          # Create infrastructure parameters file (for infra.bicep)
          cat > infra-params.json << EOF
          {
            "\$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "projectName": {"value": "prism"},
              "environment": {"value": "${{ github.event.inputs.environment || 'dev' }}"},
              "location": {"value": "${{ env.AZURE_LOCATION }}"},
              "githubToken": {"value": "${{ secrets.GH_PAT }}"},
              "githubWebhookSecret": {"value": "${{ secrets.GITHUB_WEBHOOK_SECRET }}"}
            }
          }
          EOF

          # Create app parameters file (for app.bicep - includes repo info)
          cat > app-params.json << EOF
          {
            "\$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "projectName": {"value": "prism"},
              "environment": {"value": "${{ github.event.inputs.environment || 'dev' }}"},
              "location": {"value": "${{ env.AZURE_LOCATION }}"},
              "githubToken": {"value": "${{ secrets.GH_PAT }}"},
              "githubWebhookSecret": {"value": "${{ secrets.GITHUB_WEBHOOK_SECRET }}"},
              "githubRepoOwner": {"value": "${{ github.repository_owner }}"},
              "githubRepoName": {"value": "${{ github.event.repository.name }}"}
            }
          }
          EOF

          # Deploy infrastructure (Step 1: foundation resources)
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.DEPLOYMENT_NAME }} \
            --template-file foundry/deployment_config/bicep/infra.bicep \
            --parameters infra-params.json \
            --output json > deployment-output.json
          
          # Extract outputs from infra deployment only
          ACR_NAME=$(jq -r '.properties.outputs.containerRegistryName.value' deployment-output.json)
          ACR_LOGIN_SERVER=$(jq -r '.properties.outputs.containerRegistryLoginServer.value' deployment-output.json)
          FUNCTION_APP_NAME=$(jq -r '.properties.outputs.functionAppName.value' deployment-output.json)
          
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV
          echo "FUNCTION_APP_NAME=$FUNCTION_APP_NAME" >> $GITHUB_ENV
      
      - name: Get Deployment Outputs (existing deployment)
        if: ${{ inputs.skip_infrastructure }}
        run: |
          # Get the latest infrastructure deployment for ACR/Function outputs
          LATEST_INFRA_DEPLOYMENT=$(az deployment group list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, 'prism-deploy') && !contains(name, '-app')] | sort_by(@, &properties.timestamp) | [-1].name" \
            --output tsv)
          
          az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name $LATEST_INFRA_DEPLOYMENT \
            --query "properties.outputs" \
            --output json > deployment-output.json
          
          # Get the latest app deployment for Container App outputs
          LATEST_APP_DEPLOYMENT=$(az deployment group list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, 'prism-deploy') && contains(name, '-app')] | sort_by(@, &properties.timestamp) | [-1].name" \
            --output tsv)
          
          az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name $LATEST_APP_DEPLOYMENT \
            --query "properties.outputs" \
            --output json > app-deployment-output.json
          
          # Extract outputs from infrastructure deployment
          ACR_NAME=$(jq -r '.containerRegistryName.value' deployment-output.json)
          ACR_LOGIN_SERVER=$(jq -r '.containerRegistryLoginServer.value' deployment-output.json)
          FUNCTION_APP_NAME=$(jq -r '.functionAppName.value' deployment-output.json)
          
          # Extract outputs from app deployment
          CONTAINER_APP_NAME=$(jq -r '.containerAppName.value' app-deployment-output.json)
          ORCHESTRATOR_URL=$(jq -r '.orchestratorUrl.value' app-deployment-output.json)
          
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV
          echo "CONTAINER_APP_NAME=$CONTAINER_APP_NAME" >> $GITHUB_ENV
          echo "FUNCTION_APP_NAME=$FUNCTION_APP_NAME" >> $GITHUB_ENV
          echo "ORCHESTRATOR_URL=$ORCHESTRATOR_URL" >> $GITHUB_ENV
      
      # ════════════════════════════════════════════════════════════
      # Build and Deploy Container
      # ════════════════════════════════════════════════════════════
      
      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}
      
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.ACR_LOGIN_SERVER }}/prism-orchestrator:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ACR_LOGIN_SERVER }}/prism-orchestrator:latest"
          
          docker build \
            --platform linux/amd64 \
            -t $IMAGE_TAG \
            -t $IMAGE_LATEST \
            -f foundry/deployment_config/orchestrator/Dockerfile \
            .
          
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
      
      - name: Deploy Container App
        if: ${{ !inputs.skip_infrastructure }}
        run: |
          # Deploy Container App (Step 2: app.bicep)
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.DEPLOYMENT_NAME }}-app \
            --template-file foundry/deployment_config/bicep/app.bicep \
            --parameters app-params.json \
            --output json > app-deployment-output.json
          
          # Extract Container App outputs
          CONTAINER_APP_NAME=$(jq -r '.properties.outputs.containerAppName.value' app-deployment-output.json)
          ORCHESTRATOR_URL=$(jq -r '.properties.outputs.orchestratorUrl.value' app-deployment-output.json)
          
          echo "CONTAINER_APP_NAME=$CONTAINER_APP_NAME" >> $GITHUB_ENV
          echo "ORCHESTRATOR_URL=$ORCHESTRATOR_URL" >> $GITHUB_ENV
      
      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_TAG }}
      
      # ════════════════════════════════════════════════════════════
      # Deploy Azure Functions
      # ════════════════════════════════════════════════════════════
      
      - name: Install Azure Functions Core Tools
        if: env.FUNCTION_APP_NAME != 'not-deployed'
        run: |
          wget -q https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install azure-functions-core-tools-4 -y
      
      - name: Install Python Dependencies
        if: env.FUNCTION_APP_NAME != 'not-deployed'
        working-directory: mcp_servers/azure_mcp_server
        run: |
          pip install -r requirements.txt
      
      - name: Deploy Function App
        if: env.FUNCTION_APP_NAME != 'not-deployed'
        working-directory: mcp_servers/azure_mcp_server
        run: |
          func azure functionapp publish ${{ env.FUNCTION_APP_NAME }} --python
      
      # ════════════════════════════════════════════════════════════
      # Post-Deployment
      # ════════════════════════════════════════════════════════════
      
      - name: Health Check
        run: |
          echo "Testing orchestrator health endpoint..."
          sleep 30  # Wait for container to start
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.ORCHESTRATOR_URL }}/health)
          
          if [ $RESPONSE -eq 200 ]; then
            echo "✓ Health check passed (HTTP $RESPONSE)"
          else
            echo "✗ Health check failed (HTTP $RESPONSE)"
            exit 1
          fi
      
      - name: Create Deployment Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # PRism Deployment Summary
          
          ## 🚀 Deployment Details
          
          - **Environment**: ${{ github.event.inputs.environment || 'dev' }}
          - **Resource Group**: ${{ env.AZURE_RESOURCE_GROUP }}
          - **Location**: ${{ env.AZURE_LOCATION }}
          - **Deployment**: ${{ env.DEPLOYMENT_NAME }}
          - **Commit**: ${{ github.sha }}
          
          ## 📦 Deployed Components
          
          - **Orchestrator**: [${{ env.ORCHESTRATOR_URL }}](${{ env.ORCHESTRATOR_URL }}/health)
          - **Container App**: ${{ env.CONTAINER_APP_NAME }}
          - **Function App**: ${{ env.FUNCTION_APP_NAME }}
          - **Container Image**: \`${{ env.IMAGE_TAG }}\`
          
          ## ✅ Verification
          
          - [x] Infrastructure deployed
          - [x] Docker image built and pushed
          - [x] Container app updated
          - [x] Function app deployed
          - [x] Health check passed
          
          ## 🔗 Quick Links
          
          - [Azure Portal](https://portal.azure.com/#@/resource/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }})
          - [Application Insights](https://portal.azure.com/#blade/HubsExtension/BrowseResource/resourceType/Microsoft.Insights%2Fcomponents)
          - [Container App Logs](https://portal.azure.com/#@/resource${{ env.CONTAINER_APP_NAME }}/logs)
          
          ---
          
          **Next Steps:**
          1. Configure GitHub webhook to point to: \`${{ env.ORCHESTRATOR_URL }}/webhook/pr\`
          2. Open a test PR to verify end-to-end flow
          3. Monitor Application Insights for traces
          EOF
      
      - name: Upload Deployment Outputs
        uses: actions/upload-artifact@v4
        with:
          name: deployment-outputs
          path: deployment-output.json
          retention-days: 30

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✓ Deployment succeeded!"
          # Add Slack/Teams notification here if needed
      
      - name: Notify Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "✗ Deployment failed!"
          # Add Slack/Teams notification here if needed
