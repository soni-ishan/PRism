# Docker Compose for Local Development & Testing
# ===============================================
# Run PRism components locally before deploying to Azure
# Usage: docker-compose up

version: '3.8'

services:
  # ──────────────────────────────────────────────────────────────
  # Orchestrator Service (FastAPI)
  # ──────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ../..
      dockerfile: foundry/deployment_config/docker/Dockerfile.orchestrator
    ports:
      - "8000:8000"
    environment:
      # Azure services (use your deployed Azure resources or local mocks)
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_SEARCH_ENDPOINT=${AZURE_SEARCH_ENDPOINT:-}
      - AZURE_SEARCH_KEY=${AZURE_SEARCH_KEY:-}
      - AZURE_CONTENT_SAFETY_ENDPOINT=${AZURE_CONTENT_SAFETY_ENDPOINT:-}
      - AZURE_CONTENT_SAFETY_KEY=${AZURE_CONTENT_SAFETY_KEY:-}
      
      # GitHub configuration
      - GH_PAT=${GH_PAT:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      
      # Observability
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      
      # Key Vault (optional in local mode)
      - KEY_VAULT_URL=${KEY_VAULT_URL:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      
      # Python configuration
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    volumes:
      - ../../agents:/app/agents
      - ../../foundry:/app/foundry
      - ../../mcp_servers:/app/mcp_servers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  default:
    name: prism-network
